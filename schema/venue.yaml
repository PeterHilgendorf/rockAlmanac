# SCHEMA: Venue
# A physical place where events happen. Only create a venue record when
# an event references it — no orphan venues.
# Venues have lifespans too: they open, close, and sometimes reopen.
# operating_periods works exactly like memberships — one record per
# continuous stretch of existence.

entity: venue
fields:
  id:        {type: slug, required: true, immutable: true}
  name:      {type: string, required: true}
  former_names: {type: list of strings, required: false, note: "e.g. First Avenue was 'The Depot', then 'Uncle Sam's'"}
  city:      {type: string, required: true}
  region:    {type: string, required: false, note: "state/province"}
  country:   {type: string, required: true}
  capacity:  {type: integer, required: false}
  operating_periods:
    type: list of periods
    required: false
    item_fields:
      start_year: {type: integer, required: true}
      end_year:   {type: integer, required: false, note: "omit if still operating"}
      as_name:    {type: string,  required: false, note: "name during this period, if different"}
  source_ids: {type: list of ids -> source, required: true}
  notes:     {type: text, required: false}

example:
  id: first-avenue-minneapolis
  name: First Avenue
  former_names: [The Depot, Uncle Sam's]
  city: Minneapolis
  region: Minnesota
  country: US
  capacity: 1550
  operating_periods:
    - {start_year: 1970, end_year: 1971, as_name: The Depot}
    - {start_year: 1972, end_year: 1981, as_name: Uncle Sam's / Sam's}
    - {start_year: 1981}
  source_ids: [wp-first-avenue]
