# Rock Almanac — events (hand-entered)
# ALBUM_RELEASE / TOUR_START / TOUR_END events are generated by build
# scripts from album and tour records — they never appear here.

# ---- 1967–1970: the Peter Green era ----------------------------------

- id: fleetwood-mac-formation-1967
  event_type: FORMATION
  date: 1967-07-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  person_ids: [peter-green, mick-fleetwood, jeremy-spencer, bob-brunning]
  headline: Peter Green forms Fleetwood Mac
  description: >
    Fresh from John Mayall's Bluesbreakers, Peter Green forms a blues
    band and names it after the rhythm section he wants — drummer Mick
    Fleetwood and bassist John McVie — before McVie has even agreed to
    join.
  significance: major
  source_ids: [wp-fleetwood-mac]

- id: fleetwood-mac-debut-windsor-1967
  event_type: CONCERT
  date: 1967-08-13
  date_precision: day
  artist_ids: [fleetwood-mac]
  venue_id: royal-windsor-racecourse
  headline: Fleetwood Mac play their first show at the Windsor Festival
  description: >
    Billed as "Peter Green's Fleetwood Mac featuring Jeremy Spencer",
    the band debuts at the seventh National Jazz and Blues Festival,
    with Bob Brunning on bass.
  significance: notable
  source_ids: [wp-fleetwood-mac]

- id: fleetwood-mac-john-mcvie-joins-1967
  event_type: MEMBER_JOIN
  date: 1967-09-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  person_ids: [john-mcvie]
  headline: John McVie joins the band that already bears his name
  significance: notable
  source_ids: [wp-fleetwood-mac]

- id: fleetwood-mac-bob-brunning-exit-1967
  event_type: MEMBER_EXIT
  date: 1967-09-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  person_ids: [bob-brunning]
  headline: Bob Brunning steps aside for John McVie
  significance: minor
  source_ids: [wp-fleetwood-mac]

- id: fleetwood-mac-danny-kirwan-joins-1968
  event_type: MEMBER_JOIN
  date: 1968-08-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  person_ids: [danny-kirwan]
  headline: Eighteen-year-old Danny Kirwan joins as third guitarist
  significance: notable
  source_ids: [wp-fleetwood-mac]

- id: john-christine-marriage-1968
  event_type: MARRIAGE
  date: 1968-01-01
  date_precision: year
  person_ids: [john-mcvie, christine-mcvie]
  headline: John McVie marries Christine Perfect
  significance: notable
  source_ids: [wp-john-mcvie, wp-christine-mcvie]

- id: albatross-uk-number-one-1969
  event_type: CHART_MILESTONE
  date: 1969-01-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  headline: 'Instrumental "Albatross" reaches UK #1'
  description: >
    Peter Green's serene instrumental becomes the band's only UK
    number-one single — an unlikely feat for a blues band.
  significance: major
  source_ids: [wp-fleetwood-mac, wp-albatross]
  notes: >
    Released as a single in November 1968; spent one week at the top in
    January 1969.

- id: fleetwood-mac-peter-green-exit-1970
  event_type: MEMBER_EXIT
  date: 1970-05-20
  date_precision: day
  artist_ids: [fleetwood-mac]
  person_ids: [peter-green]
  headline: Peter Green leaves Fleetwood Mac
  description: >
    The founder walks away at the band's commercial peak, his mental
    health unravelling after heavy LSD use — giving away his money and
    wanting the band to do the same.
  significance: major
  source_ids: [wp-fleetwood-mac, wp-peter-green]

# ---- 1970–1974: the transition era -----------------------------------

- id: fleetwood-mac-christine-mcvie-joins-1970
  event_type: MEMBER_JOIN
  date: 1970-08-01
  date_precision: day
  artist_ids: [fleetwood-mac]
  person_ids: [christine-mcvie]
  headline: Christine McVie joins Fleetwood Mac
  description: >
    Having already played on Kiln House uncredited, Christine McVie —
    voted Britain's top female vocalist with Chicken Shack — makes it
    official, playing her first show as a member in New Orleans.
  significance: major
  source_ids: [wp-fleetwood-mac, wp-christine-mcvie]

- id: fleetwood-mac-jeremy-spencer-exit-1971
  event_type: MEMBER_EXIT
  date: 1971-02-15
  date_precision: day
  artist_ids: [fleetwood-mac]
  person_ids: [jeremy-spencer]
  headline: Jeremy Spencer disappears mid-tour to join the Children of God
  description: >
    Hours before a Los Angeles show, Spencer leaves the band's hotel
    saying he is going out to browse a bookshop — and joins the
    Children of God religious group. Peter Green briefly returns so the
    tour can finish.
  significance: major
  source_ids: [wp-fleetwood-mac, wp-jeremy-spencer]

- id: fleetwood-mac-bob-welch-joins-1971
  event_type: MEMBER_JOIN
  date: 1971-01-01
  date_precision: year
  artist_ids: [fleetwood-mac]
  person_ids: [bob-welch]
  headline: Bob Welch becomes Fleetwood Mac's first American member
  significance: notable
  source_ids: [wp-fleetwood-mac, wp-bob-welch]

- id: fleetwood-mac-danny-kirwan-exit-1972
  event_type: MEMBER_EXIT
  date: 1972-08-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  person_ids: [danny-kirwan]
  headline: Danny Kirwan is fired after a backstage breakdown
  description: >
    Struggling with alcohol, Kirwan smashes his guitar and refuses to
    go onstage; he is dismissed at the end of the US tour — the third
    guitarist the band has lost in two years.
  significance: notable
  source_ids: [wp-fleetwood-mac, wp-danny-kirwan]

- id: fleetwood-mac-walker-weston-join-1972
  event_type: MEMBER_JOIN
  date: 1972-01-01
  date_precision: year
  artist_ids: [fleetwood-mac]
  person_ids: [dave-walker, bob-weston]
  headline: Dave Walker and Bob Weston join the lineup
  significance: minor
  source_ids: [wp-fleetwood-mac]

- id: fleetwood-mac-dave-walker-exit-1973
  event_type: MEMBER_EXIT
  date: 1973-01-01
  date_precision: year
  artist_ids: [fleetwood-mac]
  person_ids: [dave-walker]
  headline: Dave Walker is asked to leave
  significance: minor
  source_ids: [wp-fleetwood-mac, wp-dave-walker]
  notes: Mid-1973, during the Mystery to Me sessions.

- id: fleetwood-mac-bob-weston-exit-1973
  event_type: MEMBER_EXIT
  date: 1973-10-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  person_ids: [bob-weston]
  headline: Bob Weston is fired over his affair with Jenny Boyd Fleetwood
  description: >
    Mick Fleetwood learns of the affair mid-tour; Weston is dismissed
    and the remaining US dates collapse — setting the stage for the
    fake Fleetwood Mac debacle.
  significance: notable
  source_ids: [wp-fleetwood-mac, wp-bob-weston]

- id: fake-fleetwood-mac-tour-1974
  event_type: INCIDENT
  date: 1974-01-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  headline: A fake Fleetwood Mac tours the US
  description: >
    Manager Clifford Davis, claiming he owns the name, sends an
    entirely different band on tour as Fleetwood Mac. The lawsuit that
    follows keeps the real band off the road for months and pushes
    them to relocate to Los Angeles — where they will find Buckingham
    and Nicks.
  significance: major
  source_ids: [wp-fleetwood-mac]

- id: fleetwood-mac-bob-welch-exit-1974
  event_type: MEMBER_EXIT
  date: 1974-12-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  person_ids: [bob-welch]
  headline: Bob Welch leaves, exhausted by the lawsuits and turnover
  significance: notable
  source_ids: [wp-fleetwood-mac, wp-bob-welch]

# ---- 1974–1977: the classic era --------------------------------------

- id: fleetwood-mac-buckingham-nicks-join-1974
  event_type: MEMBER_JOIN
  date: 1974-12-31
  date_precision: day
  artist_ids: [fleetwood-mac]
  person_ids: [lindsey-buckingham, stevie-nicks]
  headline: Lindsey Buckingham and Stevie Nicks join Fleetwood Mac
  description: >
    Mick Fleetwood, shopping for a studio, hears "Frozen Love" at Sound
    City and asks for the guitarist. Buckingham insists he and Nicks
    are a package deal. The classic lineup is complete.
  significance: major
  source_ids: [wp-fleetwood-mac]

- id: john-christine-divorce-1976
  event_type: DIVORCE
  date: 1976-01-01
  date_precision: year
  person_ids: [john-mcvie, christine-mcvie]
  headline: John and Christine McVie divorce
  description: >
    One of the two band couples dissolving during the making of
    Rumours — they continue working side by side in the studio.
  significance: notable
  source_ids: [wp-john-mcvie, wp-christine-mcvie]

- id: fleetwood-mac-1975-us-number-one-1976
  event_type: CHART_MILESTONE
  date: 1976-09-04
  date_precision: day
  artist_ids: [fleetwood-mac]
  album_id: fleetwood-mac-1975
  headline: "Fleetwood Mac reaches US #1 over a year after release"
  significance: major
  source_ids: [wp-fleetwood-mac, wp-billboard-200-number-ones-1976]

- id: rumours-us-number-one-1977
  event_type: CHART_MILESTONE
  date: 1977-04-02
  date_precision: day
  artist_ids: [fleetwood-mac]
  album_id: rumours-1977
  headline: "Rumours hits US #1 and stays there"
  description: >
    The album logs 31 non-consecutive weeks at the top of the Billboard
    200 on its way to becoming one of the best-selling records ever
    made.
  significance: major
  source_ids: [wp-rumours, wp-billboard-200-number-ones-1977]

- id: dreams-us-number-one-1977
  event_type: CHART_MILESTONE
  date: 1977-06-01
  date_precision: month
  artist_ids: [fleetwood-mac]
  album_id: rumours-1977
  headline: '"Dreams" becomes the band''s only US #1 single'
  significance: notable
  source_ids: [wp-rumours]
  notes: >
    The cited source dates the Hot 100 peak only to June 1977; commonly
    given elsewhere as the chart of 18 June. Upgrade precision when a
    Billboard citation is added.

- id: rumours-grammy-album-of-the-year-1978
  event_type: AWARD
  date: 1978-02-23
  date_precision: day
  artist_ids: [fleetwood-mac]
  album_id: rumours-1977
  headline: Rumours wins the Grammy for Album of the Year
  description: >
    At the 20th Annual Grammy Awards at the Shrine Auditorium in Los
    Angeles, the award goes to the band with co-producers Ken Caillat
    and Richard Dashut.
  significance: major
  source_ids: [wp-rumours, wp-20th-grammy-awards]

