# ---- Fleetwood Mac: classic era --------------------------------------

- id: lindsey-buckingham-fleetwood-mac-1
  person_id: lindsey-buckingham
  artist_id: fleetwood-mac
  founding: false
  roles: [guitar, vocals]
  start_date: 1974-12-31
  start_precision: day
  end_date: 1987-08-08
  end_precision: day
  exit_reason: quit
  source_ids: [wp-fleetwood-mac, wp-lindsey-buckingham]
  notes: >
    Quit rather than tour behind Tango in the Night — he left the day
    after the 7 August 1987 band meeting at Christine McVie's house.

- id: stevie-nicks-fleetwood-mac-1
  person_id: stevie-nicks
  artist_id: fleetwood-mac
  founding: false
  roles: [vocals]
  start_date: 1974-12-31
  start_precision: day
  end_date: 1991-01-01
  end_precision: year
  exit_reason: quit
  source_ids: [wp-fleetwood-mac, wp-stevie-nicks]
  notes: >
    Left after a dispute with Mick Fleetwood over the rights to
    "Silver Springs"; the classic lineup reconvened once for Bill
    Clinton's 1993 inaugural gala. Sources disagree on the exact end:
    Wikipedia's Fleetwood Mac article says she left in 1991, while her
    own article ties it to the end of the Behind the Mask tour in 1990.

