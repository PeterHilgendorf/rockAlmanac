  source_ids: [wp-rumours-tour, sf-fleetwood-mac]
  notes: >
    Start and end dates cross-confirmed to the day by Setlist.fm: its
    earliest tagged show is 24 Feb 1977 (Nassau Veterans Memorial
    Coliseum, Uniondale, NY) and its latest is 30 Aug 1978 (Baton
